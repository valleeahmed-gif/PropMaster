<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e7c64"/>
      <stop offset="100%" stop-color="#052520"/>
    </linearGradient>
    <linearGradient id="brass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ddb04a"/>
      <stop offset="100%" stop-color="#a87a1e"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle grid texture -->
  <rect width="512" height="512" rx="112" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- House roof -->
  <polygon points="256,92 88,248 424,248" fill="none" stroke="url(#brass)" stroke-width="18" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- House body -->
  <rect x="128" y="248" width="256" height="176" rx="6" fill="none" stroke="white" stroke-width="18" stroke-linejoin="round"/>

  <!-- Door — tall arch door with brass detail -->
  <path d="M218 424 L218 330 Q218 300 256 300 Q294 300 294 330 L294 424" fill="none" stroke="url(#brass)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Door knob -->
  <circle cx="283" cy="368" r="8" fill="url(#brass)"/>

  <!-- Left window -->
  <rect x="148" y="280" width="46" height="42" rx="4" fill="none" stroke="white" stroke-width="12" opacity="0.7"/>
  <line x1="148" y1="301" x2="194" y2="301" stroke="white" stroke-width="8" opacity="0.5"/>
  <line x1="171" y1="280" x2="171" y2="322" stroke="white" stroke-width="8" opacity="0.5"/>

  <!-- Right window -->
  <rect x="318" y="280" width="46" height="42" rx="4" fill="none" stroke="white" stroke-width="12" opacity="0.7"/>
  <line x1="318" y1="301" x2="364" y2="301" stroke="white" stroke-width="8" opacity="0.5"/>
  <line x1="341" y1="280" x2="341" y2="322" stroke="white" stroke-width="8" opacity="0.5"/>

  <!-- Chimney -->
  <rect x="308" y="108" width="32" height="60" rx="4" fill="url(#brass)"/>

  <!-- Brass ground line -->
  <line x1="96" y1="424" x2="416" y2="424" stroke="url(#brass)" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
</svg>
