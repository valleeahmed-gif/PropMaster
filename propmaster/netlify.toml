# Netlify build settings
[build]
  publish = "dist"
  command = "npm run build"

# ── Redirects ─────────────────────────────────────────────
# Order matters — Netlify applies the first matching rule

[[redirects]]
  # All /app/* routes → React app (SPA fallback)
  # This lets React Router handle /app/login, /app/dashboard etc.
  from = "/app/*"
  to = "/app/index.html"
  status = 200

[[redirects]]
  # Root and all other paths → landing page
  # The landing page handles its own navigation
  from = "/*"
  to = "/index.html"
  status = 200
