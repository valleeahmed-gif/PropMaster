name = "propmaster"
main = "worker.js"
compatibility_date = "2026-06-01"

# Bind the built static files so the Worker can serve them via env.ASSETS.
# The Worker (worker.js) handles SPA fallback for the two entry points:
#   /            → landing page (dist/index.html)
#   /app/*       → React app    (dist/app/index.html)
#
# We use a Worker script + ASSETS binding instead of a bare [assets] static
# deployment because this project has TWO separate HTML entry points and the
# plain _redirects approach hit Cloudflare's ".html-stripping" infinite-loop
# detection. Explicit Worker routing avoids that entirely.
[assets]
directory = "./dist"
binding = "ASSETS"
